<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>My Portal — Student Portal</title>
<link rel="apple-touch-icon" sizes="180x180" href="apple-touch-icon.png">
<link rel="icon" type="image/png" sizes="32x32" href="favicon-32x32.png">
<link rel="icon" type="image/png" sizes="16x16" href="favicon-16x16.png">
<link rel="icon" href="favicon.ico" sizes="any">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Manrope:wght@400;500;600;700&family=IBM+Plex+Mono:wght@500;600&family=Space+Grotesk:wght@700&display=swap" rel="stylesheet">
<link rel="stylesheet" href="css/style.css">
</head>
<body class="portal-body">

<header class="portal-bar">
  <div class="portal-bar-left">
    <a href="index.html" class="logo">
      <svg class="logo-mark" viewBox="0 0 100 70" aria-hidden="true" focusable="false">
        <path d="M50,2 L61,22 L50,17 L39,22 Z" fill="currentColor"/>
        <rect x="47.6" y="19" width="2" height="36" fill="currentColor"/>
        <rect x="52.4" y="19" width="1.6" height="36" fill="currentColor"/>
        <path d="M7,58 C24,58 33,58 34,56 C42,42 45,23 49,23" fill="none" stroke="currentColor" stroke-width="4.5" stroke-linecap="round"/>
        <path d="M93,58 C76,58 67,58 66,56 C58,42 55,23 51,23" fill="none" stroke="currentColor" stroke-width="4.5" stroke-linecap="round"/>
      </svg>
      <span class="logo-wordmark" aria-hidden="true">Z<span class="logo-e"><span></span><span></span><span></span></span>NITH</span>
      <span class="sr-only">Zenith</span>
    </a>
    <nav class="portal-nav">
      <a href="portal.html" class="portal-nav-link active">Portal</a>
      <a href="calendar.html" class="portal-nav-link">Calendar</a>
    </nav>
  </div>
  <div class="portal-actions">
    <a id="open-direct-link" href="#" target="_blank" rel="noopener" class="portal-link">Open ↗</a>
    <button id="logout-btn" class="portal-logout">Log out</button>
  </div>
</header>

<main class="portal-frame-wrap">
  <iframe id="embed-frame" class="embed-frame" title="Notion portal"></iframe>
  <div id="embed-unavailable" class="embed-unavailable" hidden>
    <p>This page is temporarily unavailable.</p>
    <a id="embed-unavailable-link" href="#" target="_blank" rel="noopener" class="btn-primary">Open in Notion ↗</a>
  </div>
</main>

<script src="js/data.js"></script>
<script src="js/app.js"></script>
<script>
  requireLogin();
  var student = getCurrentStudent();
  renderEmbedPage(student, student.portal.notionUrl, "Notion", student.portal.notionAvailable);

  document.getElementById('logout-btn').addEventListener('click', logout);
</script>
</body>
</html>
