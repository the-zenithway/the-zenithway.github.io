<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>My Portal — Student Portal</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Bitter:wght@400;600;700&family=Work+Sans:wght@400;500;600&family=IBM+Plex+Mono:wght@500;600&display=swap" rel="stylesheet">
<link rel="stylesheet" href="css/style.css">
</head>
<body>

<header class="site-header">
  <div class="container header-inner">
    <a href="index.html" class="logo">Student Portal</a>
    <nav>
      <a href="index.html">Home</a>
      <button id="logout-btn" class="btn-nav">Log Out</button>
    </nav>
  </div>
</header>

<main class="container">
  <section id="portal-content">
    <!-- Filled in by renderPortal() in js/app.js -->
  </section>
</main>

<footer>
  <div class="container">
    <p>Student Portal — built with plain HTML, CSS and JS.</p>
  </div>
</footer>

<script src="js/data.js"></script>
<script src="js/app.js"></script>
<script>
  requireLogin();
  var student = getCurrentStudent();
  renderPortal(student);

  document.getElementById('logout-btn').addEventListener('click', logout);
</script>
</body>
</html>
