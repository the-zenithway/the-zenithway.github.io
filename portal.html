<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>My Portal — Student Portal</title>
<link rel="apple-touch-icon" sizes="180x180" href="apple-touch-icon.png">
<link rel="icon" type="image/png" sizes="32x32" href="favicon-32x32.png">
<link rel="icon" type="image/png" sizes="16x16" href="favicon-16x16.png">
<link rel="icon" href="favicon.ico" sizes="any">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Manrope:wght@400;500;600;700&family=IBM+Plex+Mono:wght@500;600&display=swap" rel="stylesheet">
<link rel="stylesheet" href="css/style.css">
</head>
<body class="portal-body">

<header class="portal-bar">
  <div class="portal-bar-left">
    <a href="index.html" class="logo">Student Portal</a>
    <nav class="portal-nav">
      <a href="portal.html" class="portal-nav-link active">Portal</a>
      <a href="calendar.html" class="portal-nav-link">Calendar</a>
    </nav>
  </div>
  <div class="portal-actions">
    <a id="open-direct-link" href="#" target="_blank" rel="noopener" class="portal-link">Open ↗</a>
    <button id="logout-btn" class="portal-logout">Log out</button>
  </div>
</header>

<main class="portal-frame-wrap">
  <iframe id="embed-frame" class="embed-frame" title="Notion portal"></iframe>
</main>

<script src="js/data.js"></script>
<script src="js/app.js"></script>
<script>
  requireLogin();
  var student = getCurrentStudent();
  renderEmbedPage(student, student.portal.notionUrl, "Notion");

  document.getElementById('logout-btn').addEventListener('click', logout);
</script>
</body>
</html>
