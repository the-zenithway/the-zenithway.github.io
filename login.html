<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Log In — Zenith</title>
<link rel="apple-touch-icon" sizes="180x180" href="apple-touch-icon.png">
<link rel="icon" type="image/png" sizes="32x32" href="favicon-32x32.png">
<link rel="icon" type="image/png" sizes="16x16" href="favicon-16x16.png">
<link rel="icon" href="favicon.ico" sizes="any">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Manrope:wght@400;500;600;700&family=IBM+Plex+Mono:wght@500;600&family=Space+Grotesk:wght@700&display=swap" rel="stylesheet">
<link rel="stylesheet" href="css/style.css">
</head>
<body>

<header class="site-header">
  <div class="container header-inner">
    <a href="index.html" class="logo">
      <svg class="logo-mark" viewBox="0 0 100 70" aria-hidden="true" focusable="false">
        <path d="M50,2 L61,22 L50,17 L39,22 Z" fill="currentColor"/>
        <rect x="47.6" y="19" width="2" height="36" fill="currentColor"/>
        <rect x="52.4" y="19" width="1.6" height="36" fill="currentColor"/>
        <path d="M7,58 C24,58 33,58 34,56 C42,42 45,23 49,23" fill="none" stroke="currentColor" stroke-width="4.5" stroke-linecap="round"/>
        <path d="M93,58 C76,58 67,58 66,56 C58,42 55,23 51,23" fill="none" stroke="currentColor" stroke-width="4.5" stroke-linecap="round"/>
      </svg>
      <span class="logo-wordmark" aria-hidden="true">Z<span class="logo-e"><span></span><span></span><span></span></span>NITH</span>
      <span class="sr-only">Zenith</span>
    </a>
    <nav>
      <a href="index.html">Home</a>
      <a href="philosophy.html">Philosophy</a>
      <a href="resources.html">Resources</a>
      <a href="faq.html">FAQ</a>
      <a href="portal.html">Portal</a>
    </nav>
  </div>
</header>

<main>
  <section class="login-section container">
    <div class="login-card">
      <h1>Student Log In</h1>
      <p class="muted">Enter your username and password to access your portal.</p>

      <form id="login-form">
        <label for="username">Username</label>
        <input type="text" id="username" autocomplete="username" required>

        <label for="password">Password</label>
        <input type="password" id="password" autocomplete="current-password" required>

        <p id="login-error" class="error-message" hidden>Incorrect username or password. Try again.</p>

        <button type="submit" class="btn-primary btn-full">Log In</button>
      </form>
    </div>
  </section>
</main>

<footer>
  <div class="container">
    <div id="social-links" class="social-icons"></div>
    <p>The process is clear. Your potential is limitless. Let’s get to work.</p>
  </div>
</footer>

<script src="js/data.js"></script>
<script src="js/social-links.js"></script>
<script src="js/app.js"></script>
<script>
  renderSocialLinks();

  document.getElementById('login-form').addEventListener('submit', function (e) {
    e.preventDefault();
    var username = document.getElementById('username').value.trim();
    var password = document.getElementById('password').value;

    if (login(username, password)) {
      window.location.href = getLoginRedirect();
    } else {
      document.getElementById('login-error').hidden = false;
    }
  });
</script>
</body>
</html>
